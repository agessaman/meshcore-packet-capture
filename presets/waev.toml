[[broker]]
name = "waev-a"
enabled = true
server = "mqtt-a.waev.app"
port = 443
transport = "websockets"
keepalive = 55
qos = 0
retain = false

[broker.tls]
enabled = true
verify = true

[broker.auth]
method = "token"
audience = "mqtt-a.waev.app"
expiry = 3300

