# Converted from .env.local for --config testing.
# Use with:
#   python -m meshcore_packet_capture --config /Users/adam/meshcore-packet-capture/test-from-env.local.toml

[general]
iata = "SEA"
log_level = "DEBUG"

[update]
repo = "agessaman/meshcore-packet-capture"
branch = "main"

[serial]
ports = ["/dev/cu.usbserial-28"]

[capture]
connection_type = "serial"
health_check_interval = 30
max_connection_retries = 0
connection_retry_delay = 3
connection_retry_delay_max = 30
connection_retry_backoff_multiplier = 1.5
exit_on_reconnect_fail = false
drain_messages = false
advert_interval_hours = 47
owner_public_key = "DADADADAA3965EB49A7AA8158BD4A4F3A73F711585F8DCFFB13A7497E071DDDA"
owner_email = "adam@gessaman.com"
binary_interface_enabled = true
binary_interface_host = "0.0.0.0"
binary_interface_port = 5001
tcp_keepalive = true
tcp_keepalive_idle = 60
tcp_keepalive_interval = 30
tcp_keepalive_count = 3

[[broker]]
name = "letsmesh-us"
enabled = true
server = "mqtt-us-v1.letsmesh.net"
port = 443
transport = "websockets"

[broker.tls]
enabled = true

[broker.auth]
method = "token"
audience = "mqtt-us-v1.letsmesh.net"

[broker.topics]
status = "meshcore/{IATA}/{PUBLIC_KEY}/status"
packets = "meshcore/{IATA}/{PUBLIC_KEY}/packets"

[[broker]]
name = "letsmesh-eu"
enabled = true
server = "mqtt-eu-v1.letsmesh.net"
port = 443
transport = "websockets"

[broker.tls]
enabled = true

[broker.auth]
method = "token"
audience = "mqtt-eu-v1.letsmesh.net"

[broker.topics]
status = "meshcore/{IATA}/{PUBLIC_KEY}/status"
packets = "meshcore/{IATA}/{PUBLIC_KEY}/packets"
